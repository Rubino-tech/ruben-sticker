<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ruben Sticker">
<meta name="theme-color" content="#1a1a2e">
<title>Ruben Sticker Map</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Leaflet loaded async — app shell shows first -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=DM+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --yellow:#FFD600;--dark:#1a1a2e;--red:#E53935;--blue:#1565C0;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
}
html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none;font-family:'DM Sans',system-ui,sans-serif;background:#e8eaf0;}

/* ── Loading ── */
#loading{
  position:fixed;inset:0;z-index:9999;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .4s;
}
#loading h1{font-family:'Permanent Marker',cursive;color:var(--yellow);font-size:2rem;text-shadow:3px 3px 0 var(--red);text-align:center;padding:0 24px;line-height:1.2;}
#loading p{color:#777;font-size:.88rem;}
#loading .err{color:var(--red);font-size:.85rem;text-align:center;padding:0 24px;display:none;}
.spinner{width:44px;height:44px;border:4px solid #333;border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Map — full screen, no header ── */
#map{position:fixed;top:0;bottom:0;left:0;right:0;z-index:1;}

/* ── Crosshair — true center of screen ── */
#crosshair{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:500;pointer-events:none;
  width:50px;height:50px;
  display:flex;align-items:center;justify-content:center;
}
.ch-v{position:absolute;width:2px;height:40px;background:rgba(229,57,53,.85);border-radius:1px;}
.ch-h{position:absolute;height:2px;width:40px;background:rgba(229,57,53,.85);border-radius:1px;}
.ch-dot{position:absolute;width:13px;height:13px;background:var(--red);border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 1.5px var(--red),0 2px 12px rgba(0,0,0,.6);}

/* ── FAB button ── */
#add-pin-btn{
  position:fixed;
  bottom:calc(24px + var(--safe-b));
  left:50%;transform:translateX(-50%);
  z-index:600;
  background:var(--yellow);color:var(--dark);
  font-family:'Permanent Marker',cursive;font-size:1.1rem;
  border:none;height:62px;padding:0 10px 0 28px;border-radius:99px;cursor:pointer;
  box-shadow:4px 4px 0 rgba(0,0,0,.2),0 0 0 3px var(--dark);
  touch-action:manipulation;
  display:flex;align-items:center;gap:10px;white-space:nowrap;
  -webkit-user-select:none;user-select:none;
  transition:transform .12s,box-shadow .12s;
}
#add-pin-btn:active{transform:translateX(-50%) scale(.95);box-shadow:2px 2px 0 rgba(0,0,0,.2),0 0 0 3px var(--dark);}
#btn-avatar{
  width:44px;height:44px;border-radius:50%;
  border:3px solid var(--dark);
  object-fit:cover;display:block;flex-shrink:0;
}

/* ── Zoom ── */
.leaflet-control-zoom{margin-top:12px !important;margin-right:calc(12px + var(--safe-r)) !important;}
.leaflet-control-zoom a{width:44px !important;height:44px !important;line-height:44px !important;font-size:20px !important;border-radius:10px !important;}

/* ── Pin icon ── */
.photo-pin{display:flex;flex-direction:column;align-items:center;filter:drop-shadow(2px 3px 5px rgba(0,0,0,.5));cursor:pointer;}
.photo-pin-circle{width:48px;height:48px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px var(--dark);overflow:hidden;background:#ddd;}
.photo-pin-circle img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-pin-tail{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:11px solid var(--dark);margin-top:-1px;}

/* ── Sheet backdrop ── */
.sbackdrop{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .3s;}
.sbackdrop.on{opacity:1;pointer-events:all;}

/* ── Bottom sheet ── */
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:2001;
  background:#fff;border-radius:22px 22px 0 0;
  display:flex;flex-direction:column;
  max-height:92dvh;
  box-shadow:0 -4px 30px rgba(0,0,0,.18);
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,0,.67,0);
  overflow:hidden;
}
.sheet.on{transform:translateY(0);transition:transform .38s cubic-bezier(.34,1.4,.64,1);}

.sheet-handle{width:40px;height:5px;background:#ddd;border-radius:3px;margin:12px auto 0;flex-shrink:0;}

.sheet-head{
  padding:14px 18px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.sheet-head h2{font-family:'Permanent Marker',cursive;color:var(--dark);font-size:1.35rem;line-height:1.1;}
.sheet-head .sub{color:#bbb;font-size:.75rem;margin-top:3px;}
.sheet-x{width:34px;height:34px;flex-shrink:0;background:#f2f2f2;border:none;border-radius:50%;font-size:18px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;margin-top:2px;}
.sheet-x:active{background:#e0e0e0;}

.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:16px 18px 8px;flex:1;}

/* ── Fields ── */
.field{margin-bottom:18px;}
.field label{display:block;color:var(--dark);font-size:.76rem;font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:.6px;}
.field input[type=text],.field textarea{
  width:100%;background:#f5f5f5;border:2px solid #e8e8e8;color:var(--dark);
  border-radius:12px;padding:14px;font-family:'DM Sans',sans-serif;
  font-size:16px;/* 16px = no iOS zoom */
  transition:border-color .2s;-webkit-appearance:none;appearance:none;
}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--dark);background:#fff;}
.field textarea{resize:none;min-height:86px;}
.field input.err{border-color:var(--red);background:#fff5f5;}
.errmsg{color:var(--red);font-size:.75rem;margin-top:5px;display:none;}
.errmsg.on{display:block;}
.req{color:var(--red);}

/* ── Photo btns ── */
.photo-row{display:flex;gap:10px;margin-bottom:12px;}
.pbtn{
  flex:1;min-height:62px;padding:10px 6px;
  background:#f5f5f5;border:2px solid #e8e8e8;border-radius:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;color:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  position:relative;overflow:hidden;touch-action:manipulation;
}
.pbtn .pi{font-size:1.6rem;}
.pbtn:active{background:#e8e8e8;}
.pbtn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;font-size:0;}
.prev-wrap{display:none;position:relative;border-radius:12px;overflow:hidden;border:2px solid var(--dark);}
.prev-wrap.on{display:block;}
.prev-wrap img{width:100%;max-height:200px;object-fit:cover;display:block;}
.rm-photo{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}

/* ── Sheet footer ── */
.sheet-foot{padding:12px 18px calc(12px + var(--safe-b));border-top:1px solid #f0f0f0;flex-shrink:0;background:#fff;}
.btn-pin{
  width:100%;height:58px;
  background:var(--dark);color:var(--yellow);
  font-family:'Permanent Marker',cursive;font-size:1.2rem;
  border:none;border-radius:14px;cursor:pointer;
  box-shadow:4px 4px 0 var(--yellow);
  touch-action:manipulation;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .1s,box-shadow .1s;
}
.btn-pin:active{transform:scale(.97);box-shadow:2px 2px 0 var(--yellow);}
.btn-pin:disabled{opacity:.5;}
.btn-close{
  width:100%;height:52px;background:#f2f2f2;color:var(--dark);
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:1rem;
  border:2px solid #e0e0e0;border-radius:14px;cursor:pointer;touch-action:manipulation;
}
.btn-close:active{background:#e0e0e0;}

/* ── View sheet specifics ── */
#vsheet .sheet-head h2{color:var(--blue);}
#vsheet .sheet-head{border-color:#e3ecff;}
.v-avatar{width:72px;height:72px;border-radius:50%;border:3px solid var(--blue);box-shadow:0 0 0 2px var(--dark);object-fit:cover;display:block;margin:4px auto 16px;}
.v-photo{width:100%;max-height:220px;object-fit:cover;border-radius:12px;margin-bottom:14px;display:none;}
.v-photo.on{display:block;}
.v-name{font-family:'Permanent Marker',cursive;font-size:1rem;color:var(--dark);background:#FFFDE7;border-left:4px solid var(--yellow);padding:10px 14px;border-radius:0 10px 10px 0;margin-bottom:10px;display:none;}
.v-name.on{display:block;}
.v-comment{background:#EEF2FF;border-left:4px solid var(--blue);padding:12px 14px;border-radius:0 10px 10px 0;color:var(--dark);font-size:.95rem;margin-bottom:14px;line-height:1.55;display:none;}
.v-comment.on{display:block;}
.v-meta{color:#bbb;font-size:.75rem;margin-bottom:16px;line-height:1.7;}
.v-none{text-align:center;color:#ccc;padding:20px 0;font-size:.9rem;}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <h1>🌟 Ruben<br>Sticker Map</h1>
  <div class="spinner"></div>
  <p id="loading-msg">Laden...</p>
  <p class="err" id="loading-err">❌ Kon kaart niet laden.<br>Controleer je internet en herlaad de pagina.</p>
</div>

<div id="map"></div>

<div id="crosshair">
  <div class="ch-v"></div><div class="ch-h"></div><div class="ch-dot"></div>
</div>

<button id="add-pin-btn" aria-label="Pin Ruben">
  Pin Ruben
  <img id="btn-avatar" src="" alt="Ruben">
</button>

<!-- ADD SHEET -->
<div class="sbackdrop" id="ab"></div>
<div class="sheet" id="asheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div><h2>🌟 Drop a Sticker!</h2><div class="sub" id="acoords">📍 Locatie...</div></div>
    <button class="sheet-x" id="ax">✕</button>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label>👤 Jouw naam <span class="req">*</span></label>
      <input type="text" id="name-inp" placeholder="Vul je naam in..." autocomplete="name" autocorrect="off" autocapitalize="words" spellcheck="false">
      <div class="errmsg" id="name-err">⚠️ Naam is verplicht!</div>
    </div>
    <div class="field">
      <label>📸 Foto (optioneel)</label>
      <div class="photo-row">
        <button class="pbtn" type="button"><span class="pi">🖼️</span>Galerij<input type="file" id="gal" accept="image/*"></button>
        <button class="pbtn" type="button"><span class="pi">📷</span>Camera<input type="file" id="cam" accept="image/*" capture="environment"></button>
      </div>
      <div class="prev-wrap" id="prevwrap">
        <img id="previmg" src="" alt="">
        <button class="rm-photo" id="rmbtn" type="button">✕</button>
      </div>
    </div>
    <div class="field">
      <label>💬 Opmerking (optioneel)</label>
      <textarea id="comment-inp" placeholder="Schrijf iets..." rows="3"></textarea>
    </div>
  </div>
  <div class="sheet-foot"><button class="btn-pin" id="pinbtn">📌 PIN IT!</button></div>
</div>

<!-- VIEW SHEET -->
<div class="sbackdrop" id="vb"></div>
<div class="sheet" id="vsheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div><h2>📌 Ruben Sticker</h2><div class="v-meta" id="vmeta" style="margin:4px 0 0;font-size:.75rem;color:#bbb"></div></div>
    <button class="sheet-x" id="vx">✕</button>
  </div>
  <div class="sheet-body">
    <img class="v-avatar" id="vavatar" src="" alt="">
    <img class="v-photo"  id="vphoto"  src="" alt="">
    <div class="v-name"    id="vname"></div>
    <div class="v-comment" id="vcomment"></div>
    <div class="v-none"    id="vnone" style="display:none"></div>
  </div>
  <div class="sheet-foot"><button class="btn-close" id="vclose">Sluiten</button></div>
</div>

// ── localStorage helpers ──
const $ = id => document.getElementById(id);
const ls = { get:(k)=>{ try{return localStorage.getItem(k);}catch(e){return null;} }, set:(k,v)=>{ try{localStorage.setItem(k,v);return true;}catch(e){return false;} } };
const LS_PINS = 'rsm-pins-v4';
const loadPins  = () => { try{return JSON.parse(ls.get(LS_PINS)||'[]');}catch(e){return[];} };
const savePins  = p => ls.set(LS_PINS, JSON.stringify(p.map(({id,lat,lng,name,comment,date,photoUrl})=>({id,lat,lng,name:name||'',comment:comment||'',date,photoUrl:photoUrl||null}))));
const loadPhoto = id => ls.get('rsm-p-'+id);
const savePhoto = (id,d) => ls.set('rsm-p-'+id,d);
  
const firebaseConfig = {
  apiKey: "AIzaSyCbtJp83pLB2bdnklJ3T1aKfKNpDu0ILzc",
  authDomain: "rubensticker-rs67.firebaseapp.com",
  projectId: "rubensticker-rs67",
  storageBucket: "rubensticker-rs67.firebasestorage.app",
  messagingSenderId: "556124047873",
  appId: "1:556124047873:web:3ad74c961be197c4158e00"
};
  
let db = null, fbStorage = null, cloudEnabled = false;
async function initCloud() {
  const c = FIREBASE_CONFIG;
  if (!c.apiKey || !c.projectId) return;
  try {
    const v = '10.11.1', base = `https://www.gstatic.com/firebasejs/${v}`;
    await loadScript(`${base}/firebase-app-compat.js`);
    await loadScript(`${base}/firebase-auth-compat.js`);
    await loadScript(`${base}/firebase-firestore-compat.js`);
    await loadScript(`${base}/firebase-storage-compat.js`);
    firebase.initializeApp(c);
    await firebase.auth().signInAnonymously();
    db = firebase.firestore();
    try { fbStorage = c.storageBucket ? firebase.storage() : null; } catch(se) { fbStorage = null; console.warn('Storage unavailable:', se.message); }
    cloudEnabled = true;
    console.log('☁️ Cloud sync active');
  } catch(e) { console.warn('Cloud sync unavailable:', e.message); }
}

// ── Image compression ──
const compress = (url,maxW=900,q=.65) => new Promise(res=>{
  const i=new Image(); i.onload=()=>{
    const c=document.createElement('canvas');
    let w=i.width,h=i.height;
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);
    res(c.toDataURL('image/jpeg',q));
  }; i.onerror=()=>res(null); i.src=url;
});

// ── App state ──
let pins=[], pendingPhoto=null;

// ── Load Leaflet dynamically ──
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

async function initMap(){
  try {
    $('loading-msg').textContent = 'Kaart laden...';
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js');
    $('loading-msg').textContent = 'Bijna klaar...';
    startApp();
  } catch(e) {
    // Show error
    $('loading-msg').style.display='none';
    $('loading-err').style.display='block';
    // After 5 more seconds try anyway
    setTimeout(()=>{ $('loading').style.opacity=0; setTimeout(()=>$('loading').style.display='none',400); }, 5000);
  }
}

function startApp(){
  // ── Set button avatar ──
  $('btn-avatar').src = RUBEN;

  // ── Map ──
  const map = L.map('map',{zoomControl:false,tap:true,tapTolerance:15}).setView([52.3,5.3],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19
  }).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);

  // ── Icons ──
  const makePin = photo => L.divIcon({
    html:`<div class="photo-pin"><div class="photo-pin-circle"><img src="${photo||RUBEN}" onerror="this.src='${RUBEN}'"></div><div class="photo-pin-tail"></div></div>`,
    iconSize:[48,58],iconAnchor:[24,58],className:''
  });

  const makeCluster = n => {
    const s=n<10?54:n<100?62:72;
    return L.divIcon({
      html:`<div style="width:${s}px;height:${s}px;border-radius:50%;border:4px solid #fff;box-shadow:0 0 0 2.5px #1a1a2e,3px 3px 8px rgba(0,0,0,.35);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;background:#1a1a2e"><img src="${RUBEN}" style="width:100%;height:100%;object-fit:cover;opacity:.4;position:absolute;inset:0"><span style="position:relative;z-index:1;font-family:'Permanent Marker',cursive;color:#FFD600;font-size:${n<100?16:13}px;text-shadow:1px 1px 3px rgba(0,0,0,.9)">${n}</span></div>`,
      iconSize:[s,s],iconAnchor:[s/2,s/2],className:''
    });
  };

  const cg = L.markerClusterGroup({
    maxClusterRadius:60,spiderfyOnMaxZoom:false,showCoverageOnHover:false,zoomToBoundsOnClick:true,
    iconCreateFunction:c=>makeCluster(c.getChildCount())
  });
  map.addLayer(cg);

  const renderPins = () => {
    cg.clearLayers();
    pins.forEach(pin=>{
      const m=L.marker([pin.lat,pin.lng],{icon:makePin(loadPhoto(pin.id)||pin.photoUrl||null)});
      m.on('click',()=>openView(pin));
      cg.addLayer(m);
    });
  };

  // ── Cloud: save a single pin + its photo to Firestore / Storage ──
  const saveToCloud = async (pin, photoData) => {
    if (!cloudEnabled) return;
    try {
      let photoUrl = null;
      if (photoData && fbStorage) {
        const ref = fbStorage.ref('photos/' + pin.id + '.jpg');
        await ref.putString(photoData, 'data_url', {contentType: 'image/jpeg'});
        photoUrl = await ref.getDownloadURL();
      }
      await db.collection('pins').doc(pin.id).set({
        id: pin.id, lat: pin.lat, lng: pin.lng,
        name: pin.name||'', comment: pin.comment||'',
        date: pin.date, photoUrl: photoUrl||null
      });
      const idx = pins.findIndex(p => p.id === pin.id);
      if (idx >= 0 && photoUrl) { pins[idx].photoUrl = photoUrl; renderPins(); }
    } catch(e) { console.warn('Cloud save failed:', e.message); }
  };

  // ── Sheet helpers ──
  const openSheet = (bd,sh) => { bd.classList.add('on'); sh.classList.add('on'); };
  const closeSheet= (bd,sh) => { bd.classList.remove('on'); sh.classList.remove('on'); };

  const ab=$('ab'),as=$('asheet'),vb=$('vb'),vs=$('vsheet');
  ab.addEventListener('click',closeAdd); $('ax').addEventListener('click',closeAdd);
  vb.addEventListener('click',closeView); $('vx').addEventListener('click',closeView); $('vclose').addEventListener('click',closeView);

  function closeAdd(){ closeSheet(ab,as); resetForm(); }
  function closeView(){ closeSheet(vb,vs); }

  // ── Add sheet ──
  $('add-pin-btn').addEventListener('click',()=>{
    const c=map.getCenter();
    $('acoords').textContent=`📍 ${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}`;
    resetForm();
    $('name-inp').value=ls.get('rsm-last-name')||'';
    openSheet(ab,as);
    setTimeout(()=>{ if(!$('name-inp').value) $('name-inp').focus(); },400);
  });

  function resetForm(){
    $('name-inp').classList.remove('err'); $('name-err').classList.remove('on');
    $('comment-inp').value=''; $('gal').value=''; $('cam').value='';
    pendingPhoto=null; setPreview(null);
  }

  function setPreview(url){
    const w=$('prevwrap'),i=$('previmg');
    if(url){i.src=url;w.classList.add('on');}else{i.src='';w.classList.remove('on');}
  }

  $('rmbtn').addEventListener('click',e=>{
    e.stopPropagation(); pendingPhoto=null; setPreview(null); $('gal').value=''; $('cam').value='';
  });

  const handleFile=inp=>{
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=async e=>{ const c=await compress(e.target.result); if(c){pendingPhoto=c;setPreview(c);} };
    r.readAsDataURL(f);
  };
  $('gal').addEventListener('change',function(){handleFile(this);});
  $('cam').addEventListener('change',function(){handleFile(this);});
  $('name-inp').addEventListener('input',function(){
    if(this.value.trim()){this.classList.remove('err');$('name-err').classList.remove('on');}
  });

  $('pinbtn').addEventListener('click',()=>{
    const ne=$('name-inp'),name=ne.value.trim();
    if(!name){ne.classList.add('err');$('name-err').classList.add('on');ne.focus();return;}
    const btn=$('pinbtn');
    btn.textContent='⏳ Opslaan...';btn.disabled=true;
    ls.set('rsm-last-name',name);
    const c=map.getCenter();
    const pin={id:Date.now().toString(36)+'-'+Math.random().toString(36).slice(2),lat:c.lat,lng:c.lng,name,comment:$('comment-inp').value.trim(),date:new Date().toISOString()};
    const capturedPhoto=pendingPhoto;
    if(capturedPhoto) savePhoto(pin.id,capturedPhoto);
    pins.push(pin);
    if(!savePins(pins)){pins.pop();btn.textContent='📌 PIN IT!';btn.disabled=false;alert('Opslag vol!');return;}
    renderPins();btn.textContent='📌 PIN IT!';btn.disabled=false;
    closeAdd();
    saveToCloud(pin,capturedPhoto);
  });

  // ── View sheet ──
  function openView(pin){
    const photo=loadPhoto(pin.id)||pin.photoUrl||null;
    const d=new Date(pin.date);
    $('vmeta').textContent='📅 '+d.toLocaleDateString('nl-NL',{weekday:'short',year:'numeric',month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
    $('vavatar').src=photo||RUBEN;
    const vp=$('vphoto');
    if(photo){vp.src=photo;vp.classList.add('on');}else{vp.src='';vp.classList.remove('on');}
    const vn=$('vname');
    if(pin.name){vn.textContent='👤 '+pin.name;vn.classList.add('on');}else{vn.classList.remove('on');}
    const vc=$('vcomment');
    if(pin.comment){vc.textContent='"'+pin.comment+'"';vc.classList.add('on');}else{vc.classList.remove('on');}
    const vno=$('vnone');
    if(!photo&&!pin.comment){vno.textContent='🌟 Een Ruben Sticker is hier geplaatst!';vno.style.display='block';}else{vno.style.display='none';}
    openSheet(vb,vs);
  }

  // ── Init ──
  pins=loadPins();
  renderPins();
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=>map.setView([p.coords.latitude,p.coords.longitude],14),()=>{},{timeout:6000,enableHighAccuracy:true});
  }
  $('loading').style.opacity='0';
  setTimeout(()=>$('loading').style.display='none',400);
  // ── Cloud sync (background — pins appear as soon as Firebase is ready) ──
  initCloud().then(()=>{
    if(!cloudEnabled) return;
    db.collection('pins').onSnapshot(snap=>{
      const cp=[]; snap.forEach(d=>cp.push(d.data()));
      const cpIds=new Set(cp.map(c=>c.id));
      const lo=pins.filter(p=>!cpIds.has(p.id));
      pins=[...cp,...lo]; savePins(pins); renderPins();
    },err=>console.warn('Firestore error:',err));
  });
}

// ── Boot ──
initMap();
</script>
